<div class="portal-panel-stack">
  <div class="portal-panel-header">
    <h5 class="portal-panel-title">Users</h5>
    <span class="portal-panel-subtitle">{{ users|length }} users</span>
  </div>

  {% if users %}
    <div class="portal-panel-stack">
      {% for u in users %}
        <div class="portal-panel-section">
          <div class="portal-panel-header">
            <div>
              <div class="portal-bundle-title">{{ u.username }}</div>
              <div class="portal-panel-note">{{ u.role }} · {% if u.is_active %}Active{% else %}Inactive{% endif %}</div>
            </div>
            <div class="portal-panel-subtitle">{{ u.created_at.strftime('%Y-%m-%d') if u.created_at else '-' }}</div>
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="portal-panel-empty">No users found.</div>
  {% endif %}
</div>
