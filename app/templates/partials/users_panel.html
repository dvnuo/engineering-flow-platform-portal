<div class="space-y-3">
  <div class="flex items-center justify-between">
    <h5 class="text-sm font-semibold text-slate-800 dark:text-slate-200">Users</h5>
    <span class="text-xs text-slate-500 dark:text-slate-400">{{ users|length }} users</span>
  </div>

  {% if users %}
    <div class="space-y-2">
      {% for u in users %}
        <div class="flex items-center justify-between rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40 px-3 py-2">
          <div>
            <div class="text-sm font-medium text-slate-800 dark:text-slate-200">{{ u.username }}</div>
            <div class="text-xs text-slate-500 dark:text-slate-400">{{ u.role }} · {% if u.is_active %}Active{% else %}Inactive{% endif %}</div>
          </div>
          <div class="text-xs text-slate-400">
            {{ u.created_at.strftime('%Y-%m-%d') if u.created_at else '-' }}
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40 px-3 py-4 text-center text-xs text-slate-500">
      No users found.
    </div>
  {% endif %}
</div>
