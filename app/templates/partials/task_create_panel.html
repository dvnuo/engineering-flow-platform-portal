<div class="portal-panel-stack">
  <div class="portal-panel-header">
    <div>
      <h2 class="portal-panel-title">Create Task</h2>
      <p class="portal-panel-subtitle">Task = create AgentTask from Task Template.</p>
    </div>
  </div>
  <form id="create-task-from-template-form" class="portal-panel-stack">
    <section class="portal-panel-section">
      <label class="portal-form-label">Template</label>
      <select name="template_id" class="portal-form-select" required>
        {% for template in task_templates %}
        <option value="{{ template.template_id }}">{{ template.label }} ({{ template.template_id }})</option>
        {% endfor %}
      </select>
    </section>

    <section class="portal-panel-section" data-task-common>
      <label class="portal-form-label">Assignee Agent</label>
      <select name="assignee_agent_id" class="portal-form-select" required>
        {% for agent in agents %}<option value="{{ agent.id }}">{{ agent.name }} ({{ agent.id }})</option>{% endfor %}
      </select>
      <label><input type="checkbox" name="dispatch_immediately" checked /> Dispatch immediately</label>
    </section>

    <section class="portal-panel-section" data-task-bundle-fields>
      <label class="portal-form-label">Bundle Template</label>
      <select name="bundle_template_id" class="portal-form-select">
        <option value="">-- Select bundle template --</option>
        <option value="requirement.v1">requirement.v1</option>
        <option value="research.v1">research.v1</option>
        <option value="development.v1">development.v1</option>
        <option value="operations.v1">operations.v1</option>
      </select>
      <label class="portal-form-label">Bundle Repo</label><input class="portal-form-input" name="bundle_repo" />
      <label class="portal-form-label">Bundle Path</label><input class="portal-form-input" name="bundle_path" />
      <label class="portal-form-label">Bundle Branch</label><input class="portal-form-input" name="bundle_branch" />
      <label class="portal-form-label">Manifest Repo</label><input class="portal-form-input" name="manifest_repo" />
      <label class="portal-form-label">Manifest Path</label><input class="portal-form-input" name="manifest_path" />
      <label class="portal-form-label">Manifest Branch</label><input class="portal-form-input" name="manifest_branch" />
    </section>

    <section class="portal-panel-section" data-task-sources-fields>
      <label class="portal-form-label">Jira Sources</label><textarea class="portal-form-textarea" name="jira_sources" rows="2"></textarea>
      <label class="portal-form-label">Confluence Sources</label><textarea class="portal-form-textarea" name="confluence_sources" rows="2"></textarea>
      <label class="portal-form-label">GitHub Docs Sources</label><textarea class="portal-form-textarea" name="github_doc_sources" rows="2"></textarea>
      <label class="portal-form-label">Figma Sources</label><textarea class="portal-form-textarea" name="figma_sources" rows="2"></textarea>
    </section>

    <section class="portal-panel-section" data-task-github-fields>
      <label class="portal-form-label">GitHub Owner</label><input class="portal-form-input" name="owner" />
      <label class="portal-form-label">GitHub Repo</label><input class="portal-form-input" name="repo" />
      <label class="portal-form-label">Pull Number</label><input class="portal-form-input" name="pull_number" type="number" />
      <label class="portal-form-label">Review Event</label>
      <select class="portal-form-select" name="review_event">
        <option value="COMMENT">COMMENT</option>
        <option value="APPROVE">APPROVE</option>
        <option value="REQUEST_CHANGES">REQUEST_CHANGES</option>
      </select>
      <label class="portal-form-label">Writeback Mode</label><input class="portal-form-input" name="writeback_mode" />
      <label class="portal-form-label">Head SHA</label><input class="portal-form-input" name="head_sha" />
    </section>

    <button type="submit" class="portal-btn is-primary">Create Task</button>
  </form>
</div>
