<article class="ml-auto max-w-3xl rounded-2xl border border-blue-500/20 bg-blue-500/10 p-4">
  <p class="text-xs uppercase tracking-wide text-blue-200 mb-2">You</p>
  <div class="whitespace-pre-wrap text-slate-100">{{ user_message }}</div>
</article>

<article class="max-w-3xl rounded-2xl border border-slate-700 bg-slate-800/80 p-4 assistant-message">
  <p class="text-xs uppercase tracking-wide text-slate-400 mb-2">Assistant</p>
  <div class="md-render prose prose-invert max-w-none" data-md="{{ assistant_message | e }}"></div>
</article>

<input id="chat-session-id" name="session_id" type="hidden" value="{{ session_id }}" hx-swap-oob="true" />
