<div class="flex flex-col items-start">
  <div class="flex items-center gap-2 mb-1 assistant-header">
    <span class="text-xs font-semibold text-emerald-400">{{ agent_name }}</span>
    <span class="text-xs text-slate-500">{{ timestamp }}</span>
  </div>
  <article class="max-w-2xl rounded-2xl border border-slate-600 bg-slate-800 px-4 py-3 assistant-message">
    <div class="md-render prose prose-invert max-w-none text-sm" data-md="{{ assistant_message | data_attr }}"></div>
  </article>
</div>

<input id="chat-session-id" name="session_id" type="hidden" value="{{ session_id }}" hx-swap-oob="true" />
<input id="chat-user-message-id" name="user_message_id" type="hidden" value="{{ user_message_id }}" hx-swap-oob="true" />
