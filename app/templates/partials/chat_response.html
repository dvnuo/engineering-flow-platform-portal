<div class="message-row message-row-assistant">
  <div class="message-meta">
    <span class="message-author">{{ agent_name }}</span>
    <span class="message-timestamp">{{ timestamp }}</span>
  </div>
  <article class="message-surface message-surface-assistant assistant-message">
    <div class="message-markdown md-render max-w-none text-sm"
         data-md="{{ assistant_message | data_attr }}"
         data-display-blocks='{{ display_blocks | tojson | replace("'", "&#39;") | safe }}'
         {% if events %}data-events='{{ events | tojson }}'{% endif %}></div>
  </article>
</div>

<input id="chat-session-id" name="session_id" type="hidden" value="{{ session_id }}" hx-swap-oob="true" />
<input id="chat-user-message-id" name="user_message_id" type="hidden" value="{{ user_message_id }}" hx-swap-oob="true" />
