<div class="space-y-3">
  <div class="flex items-center justify-between">
    <h5 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Recent Sessions</h5>
    <button
      type="button"
      id="sessions-new-chat-btn"
      class="inline-flex items-center rounded-lg bg-blue-600 px-3 py-1.5 text-xs font-medium text-white shadow-sm hover:bg-blue-500"
    >
      <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      New Chat
    </button>
  </div>

  {% if sessions %}
    <div id="sessions-list" class="space-y-1.5">
      {% for session in sessions %}
        <button
          type="button"
          class="w-full rounded-lg border px-3 py-2.5 text-left transition-all duration-150 {{ 'border-blue-500 bg-blue-500/15 shadow-sm' if session.session_id == current_session_id else 'border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-700/60 hover:border-slate-300 dark:hover:border-slate-500' }}"
          data-session-id="{{ session.session_id }}"
          data-session-name="{{ session.name or 'New Chat' }}"
          title="{{ session.name or 'New Chat' }}"
        >
          <div class="truncate text-sm font-medium text-slate-800 dark:text-slate-100">{{ session.name or 'New Chat' }}</div>
          <div class="mt-1 truncate text-xs text-slate-500 dark:text-slate-400">{{ session.last_message or 'No messages yet' }}</div>
        </button>
      {% endfor %}
    </div>
  {% else %}
    <div class="rounded-lg border border-dashed border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800/30 px-3 py-4 text-center text-xs text-slate-500">
      No recent sessions yet
    </div>
  {% endif %}
</div>
