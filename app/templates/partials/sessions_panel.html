<div class="sessions-panel">
  <div class="sessions-panel-head">
    <h5>Recent Sessions</h5>
    <button type="button" id="sessions-new-chat-btn" class="sessions-new-chat-btn">
      <i data-lucide="plus" class="w-3 h-3"></i>
      New Chat
    </button>
  </div>

  {% if sessions %}
    <div id="sessions-list" class="sessions-list">
      {% for session in sessions %}
        <div class="sessions-item {{ 'is-active' if session.session_id == current_session_id else '' }}">
          <button
            type="button"
            class="sessions-item-main"
            data-session-id="{{ session.session_id }}"
            data-session-name="{{ session.name or 'New Chat' }}"
            title="{{ session.name or 'New Chat' }}"
          >
            <div class="sessions-item-copy">
              <div class="sessions-item-title">{{ session.name or 'New Chat' }}</div>
              {% if session.latest_event_state or session.context_compaction_level or session.active_skill_name or session.is_metadata_only %}
                <div class="sessions-item-meta">
                  {% if session.latest_event_state %}
                    <span class="badge badge--neutral">{{ session.latest_event_state }}</span>
                  {% endif %}
                  {% if session.context_compaction_level %}
                    <span class="badge badge--info">{{ session.context_compaction_level }}</span>
                  {% endif %}
                  {% if session.active_skill_name %}
                    <span class="badge badge--info" title="Active skill{% if session.active_skill_status %}: {{ session.active_skill_status }}{% endif %}">
                      Skill: {{ session.active_skill_name }}
                    </span>
                  {% endif %}
                  {% if session.is_metadata_only %}
                    <span class="badge badge--muted">metadata only</span>
                  {% endif %}
                </div>
              {% endif %}
              <div class="sessions-item-preview">{{ session.context_summary_preview or session.active_skill_goal or session.last_message or 'No messages yet' }}</div>
              {% if session.context_next_step_preview %}
                <div class="sessions-item-preview-muted">Next: {{ session.context_next_step_preview }}</div>
              {% endif %}
              {% if session.context_objective_preview %}
                <div class="sessions-item-preview-muted" title="{{ session.context_objective_preview }}">
                  Objective: {{ session.context_objective_preview }}
                </div>
              {% endif %}
              {% if session.active_skill_name and session.active_skill_turn_count is not none %}
                <div class="sessions-item-preview-muted">
                  Active skill turn {{ session.active_skill_turn_count }}{% if session.active_skill_activation_reason %} · {{ session.active_skill_activation_reason }}{% endif %}
                </div>
              {% endif %}
            </div>
          </button>
          {% if can_manage_sessions %}
            <div class="sessions-item-actions">
              <button
                type="button"
                class="sessions-item-action"
                data-session-action="rename"
                data-session-id="{{ session.session_id }}"
                data-session-name="{{ session.name or 'New Chat' }}"
                aria-label="Rename session"
                title="Rename session"
              >
                <i data-lucide="pencil" class="w-3 h-3"></i>
              </button>
              <button
                type="button"
                class="sessions-item-action is-danger"
                data-session-action="delete"
                data-session-id="{{ session.session_id }}"
                data-session-name="{{ session.name or 'New Chat' }}"
                aria-label="Delete session"
                title="Delete session"
              >
                <i data-lucide="trash-2" class="w-3 h-3"></i>
              </button>
            </div>
          {% endif %}
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="sessions-empty">No recent sessions yet</div>
  {% endif %}
</div>
