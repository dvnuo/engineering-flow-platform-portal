<div class="sessions-panel">
  <div class="sessions-panel-head">
    <h5>Recent Sessions</h5>
    <button type="button" id="sessions-new-chat-btn" class="sessions-new-chat-btn">
      <i data-lucide="plus" class="w-3 h-3"></i>
      New Chat
    </button>
  </div>

  {% if sessions %}
    <div id="sessions-list" class="sessions-list">
      {% for session in sessions %}
        <button
          type="button"
          class="sessions-item {{ 'is-active' if session.session_id == current_session_id else '' }}"
          data-session-id="{{ session.session_id }}"
          data-session-name="{{ session.name or 'New Chat' }}"
          title="{{ session.name or 'New Chat' }}"
        >
          <div class="sessions-item-title">{{ session.name or 'New Chat' }}</div>
          <div class="sessions-item-preview">{{ session.last_message or 'No messages yet' }}</div>
        </button>
      {% endfor %}
    </div>
  {% else %}
    <div class="sessions-empty">No recent sessions yet</div>
  {% endif %}
</div>
