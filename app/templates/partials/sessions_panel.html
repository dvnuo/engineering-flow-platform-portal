<div class="space-y-3">
  <div class="flex items-center justify-between">
    <h5 class="text-sm font-semibold text-slate-200">Recent Sessions</h5>
    <button
      type="button"
      id="sessions-new-chat-btn"
      class="rounded-lg bg-blue-500 px-2 py-1 text-xs font-semibold hover:bg-blue-400"
    >
      New Chat
    </button>
  </div>

  {% if sessions %}
    <div id="sessions-list" class="space-y-2">
      {% for session in sessions %}
        <button
          type="button"
          class="w-full rounded-lg border px-2 py-2 text-left {{ 'border-blue-500 bg-blue-500/10' if session.session_id == current_session_id else 'border-slate-700 bg-slate-900/40' }}"
          data-session-id="{{ session.session_id }}"
          data-session-name="{{ session.name or 'New Chat' }}"
          title="{{ session.name or 'New Chat' }}"
        >
          <div class="truncate text-sm font-medium">{{ session.name or 'New Chat' }}</div>
          <div class="truncate text-xs text-slate-400">{{ session.last_message or 'No messages yet' }}</div>
        </button>
      {% endfor %}
    </div>
  {% else %}
    <div class="rounded-lg border border-slate-700 bg-slate-900/40 px-2 py-3 text-xs text-slate-400">
      No recent sessions.
    </div>
  {% endif %}
</div>
