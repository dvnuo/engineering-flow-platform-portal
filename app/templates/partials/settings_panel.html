<div class="space-y-3">
  <div class="flex items-center justify-between">
    <h5 class="text-sm font-semibold text-slate-200">Agent Settings (Testing)</h5>
    <span class="text-xs text-slate-400">Runtime config</span>
  </div>

  {% if status_message %}
    <div class="rounded-lg border px-2 py-2 text-xs {{ 'border-emerald-600/60 bg-emerald-900/20 text-emerald-200' if status_type == 'success' else 'border-rose-600/60 bg-rose-900/20 text-rose-200' }}">
      {{ status_message }}
    </div>
  {% endif %}

  <form
    hx-post="/app/agents/{{ agent_id }}/settings/save"
    hx-target="#tool-panel-body"
    hx-swap="innerHTML"
    class="space-y-2"
  >
    <label class="block text-xs text-slate-400">
      Model
      <input
        type="text"
        name="model"
        value="{{ llm.get('model', '') }}"
        class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-900 px-2 py-1 text-sm text-slate-100"
      />
    </label>

    <label class="block text-xs text-slate-400">
      API Base
      <input
        type="text"
        name="api_base"
        value="{{ llm.get('api_base', '') }}"
        class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-900 px-2 py-1 text-sm text-slate-100"
      />
    </label>

    <div class="grid grid-cols-2 gap-2">
      <label class="block text-xs text-slate-400">
        Temperature
        <input
          type="text"
          name="temperature"
          value="{{ llm.get('temperature', '') }}"
          class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-900 px-2 py-1 text-sm text-slate-100"
        />
      </label>

      <label class="block text-xs text-slate-400">
        Max Tokens
        <input
          type="text"
          name="max_tokens"
          value="{{ llm.get('max_tokens', '') }}"
          class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-900 px-2 py-1 text-sm text-slate-100"
        />
      </label>
    </div>

    <button
      type="submit"
      class="rounded-lg bg-blue-500 px-3 py-1.5 text-xs font-semibold text-white hover:bg-blue-400"
    >
      Save Settings
    </button>
  </form>
</div>
