<div class="portal-panel-stack">
  <div class="portal-panel-header">
    <h5 class="portal-panel-title">My Uploads</h5>
    <span class="portal-panel-subtitle">{{ files|length }} files</span>
  </div>

  {% if files %}
    <div id="uploads-list" class="portal-panel-stack">
      {% for file in files %}
        {% set file_ref = '@file_' ~ (file.file_id[:8]) %}
        <div
          class="file-row portal-panel-section"
          data-file-id="{{ file.file_id }}"
          data-file-ref="{{ file_ref }}"
        >
          <div class="portal-panel-header">
            <button
              type="button"
              class="insert-ref-btn flex-1 text-left truncate"
              title="Insert {{ file_ref }}"
            >
              <div class="portal-bundle-title truncate">{{ file.filename }}</div>
              <div class="portal-panel-note truncate">
                {{ file_ref }}
                {% if file.content_type %} · {{ file.content_type }}{% endif %}
                {% if file.size is not none %} · {{ file.size }} B{% endif %}
              </div>
            </button>
            <div class="flex items-center gap-1">
              <button type="button" class="preview-btn portal-btn" aria-label="Preview file" title="Preview">Preview</button>
              <button type="button" class="delete-btn portal-btn is-danger" aria-label="Delete file" title="Delete">Delete</button>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="portal-panel-empty">No uploaded files.</div>
  {% endif %}
</div>

<script>
(function() {
  const container = document.getElementById('uploads-list');
  if (!container) return;

  container.addEventListener('click', async function(e) {
    const row = e.target.closest('.file-row');
    if (!row) return;

    const fileId = row.dataset.fileId;

    if (e.target.closest('.insert-ref-btn')) {
      e.stopPropagation();
      if (typeof insertFileReference === 'function') {
        insertFileReference(fileId);
      }
    } else if (e.target.closest('.preview-btn')) {
      await previewFile(fileId);
    } else if (e.target.closest('.delete-btn')) {
      await deleteFile(fileId, row);
    }
  });
})();

async function deleteFile(fileId, row) {
  if (!confirm('Delete this file?')) return;

  row.style.opacity = '0.5';

  try {
    const resp = await fetch(`/a/${window.selectedAgentId}/api/files/${fileId}`, {
      method: 'DELETE'
    });
    if (!resp.ok) throw new Error('Delete failed');
    row.remove();
    if (typeof showToast === 'function') showToast('File deleted');
  } catch (e) {
    row.style.opacity = '1';
    if (typeof showToast === 'function') showToast('Delete failed: ' + e.message);
    else alert('Delete failed: ' + e.message);
  }
}

async function previewFile(fileId) {
  try {
    const resp = await fetch(`/a/${window.selectedAgentId}/api/files/${fileId}/preview?max_chars=5000`);
    if (!resp.ok) throw new Error('Preview failed');
    const data = await resp.json();

    if (data.preview) {
      setToolPanel('File Preview', '<pre class="portal-panel-pre">' + escapeHtml(data.preview) + '</pre>');
    } else {
      setToolPanel('File Preview', '<div class="portal-inline-state">No preview available</div>');
    }
  } catch (e) {
    setToolPanel('File Preview', '<div class="portal-inline-state is-error">Preview failed: ' + escapeHtml(e.message) + '</div>');
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
