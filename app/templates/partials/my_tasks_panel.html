<div id="my-tasks-panel-root" class="portal-panel-stack portal-task-workspace">
  <div class="portal-task-toolbar">
    <div>
      <h2 class="portal-panel-title">Tasks</h2>
      <p class="portal-panel-subtitle">Background agent work visible to everyone.</p>
    </div>
    <button class="portal-btn is-primary" type="button" data-open-create-task-main="1"><i data-lucide="plus" class="w-4 h-4"></i>Create Task</button>
  </div>

  <div class="portal-task-summary-strip" aria-label="Task status summary">
    <div class="portal-task-summary-item"><span>Queued</span><strong>{{ summary.queued }}</strong></div>
    <div class="portal-task-summary-item"><span>Running</span><strong>{{ summary.running }}</strong></div>
    <div class="portal-task-summary-item"><span>Done</span><strong>{{ summary.done }}</strong></div>
    <div class="portal-task-summary-item"><span>Blocked</span><strong>{{ summary.blocked }}</strong></div>
    <div class="portal-task-summary-item"><span>Failed</span><strong>{{ summary.failed }}</strong></div>
    <div class="portal-task-summary-item"><span>Cancelled</span><strong>{{ summary.cancelled }}</strong></div>
  </div>

  <div class="portal-task-card-list">
    {% include "partials/task_cards.html" %}
  </div>
</div>
