{% extends "base.html" %}
{% block content %}
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Engineering Portal</div>
    <div class="userbox">
      <div class="avatar">{{ username[0]|upper }}</div>
      <div>
        <div class="username">{{ username }}</div>
        <div class="muted tiny">role: {{ role }}</div>
      </div>
    </div>

    <form id="create-form" class="stack panel">
      <h3>Create Robot</h3>
      <input name="name" placeholder="Robot name" required />
      <input name="image" placeholder="Container image" required value="your-registry/robot:latest" />
      <input name="disk_size_gi" type="number" min="1" value="20" required />
      <input name="cpu" placeholder="CPU request (e.g. 250m)" />
      <input name="memory" placeholder="Memory request (e.g. 512Mi)" />
      <button type="submit">Create</button>
      <p id="create-msg" class="muted tiny"></p>
    </form>

    <button id="logout-btn" class="secondary">Sign Out</button>
  </aside>

  <main class="content">
    <section class="panel">
      <div class="panel-title-row">
        <h2>My Space</h2>
        <button id="refresh-my" class="secondary">Refresh</button>
      </div>
      <div id="mine-list" class="card-grid"></div>
    </section>

    <section class="panel">
      <div class="panel-title-row">
        <h2>Public Space</h2>
        <button id="refresh-public" class="secondary">Refresh</button>
      </div>
      <div id="public-list" class="card-grid"></div>
    </section>

    <section id="robot-embed-panel" class="panel robot-embed-panel hidden">
      <div class="panel-title-row">
        <h2 id="embed-title">Robot Preview</h2>
        <button id="embed-close" class="secondary">Close</button>
      </div>
      <iframe id="robot-embed-frame" title="Robot Embedded View"></iframe>
    </section>
  </main>
</div>

<script src="/static/js/app.js"></script>
{% endblock %}
