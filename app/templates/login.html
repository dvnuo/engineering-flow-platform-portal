{% extends "base.html" %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <h1>Engineering Portal</h1>
    <p class="portal-auth-copy">Sign in to manage your agent runtimes.</p>

    <form id="login-form" class="stack">
      <label>
        Username
        <input name="username" type="text" placeholder="admin" required />
      </label>
      <label>
        Password
        <input name="password" type="password" placeholder="••••••••" required />
      </label>
      <button type="submit">Sign In</button>
    </form>

    <p id="login-error" class="portal-auth-error"></p>
    
    <p class="portal-auth-footnote">
      Don't have an account? <a class="portal-auth-link" href="/register">Create one</a>
    </p>
  </div>
</div>

<script>
const form = document.getElementById("login-form");
const err = document.getElementById("login-error");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  err.textContent = "";
  const fd = new FormData(form);
  const payload = Object.fromEntries(fd.entries());

  const resp = await fetch("/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });

  if (!resp.ok) {
    err.textContent = "Sign-in failed. Please verify your username and password.";
    return;
  }
  location.href = "/app";
});
</script>
{% endblock %}
