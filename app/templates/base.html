<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title }}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                500: '#3b82f6'
              }
            }
          }
        }
      }
    </script>

    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css" />

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/highlight.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      (function () {
        const key = "portal-theme";
        const saved = localStorage.getItem(key);
        document.documentElement.setAttribute("data-theme", saved || "light");
      })();
    </script>
  </head>
  <body>
    {% block content %}{% endblock %}
  </body>
</html>
