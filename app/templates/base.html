<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title }}</title>

    <script src="/static/lib/tailwind.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                500: '#3b82f6'
              }
            }
          }
        }
      }
    </script>

    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="/static/lib/github-dark.min.css" />

    <script src="/static/lib/htmx.min.js"></script>
    <script defer src="/static/lib/alpine.min.js"></script>
    <script src="/static/lib/markdown-it.min.js"></script>
    <script src="/static/lib/highlight.min.js"></script>
    <script src="/static/lib/lucide.min.js"></script>

    <script>
      (function () {
        const key = "portal-theme";
        const saved = localStorage.getItem(key);
        document.documentElement.setAttribute("data-theme", saved || "light");
      })();
    </script>
  </head>
  <body>
    {% block content %}{% endblock %}
  </body>
</html>
