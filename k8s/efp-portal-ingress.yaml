apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: efp-portal-ingress
  namespace: default
  labels:
    app: efp-portal-ingress
  annotations:
    # Chat SSE streams and event WebSockets stay open for the duration of
    # long agent runs. The ingress-nginx defaults (60s proxy read/send
    # timeouts) would kill them during quiet stretches; runtimes also send
    # SSE keepalives every 15s as the primary protection.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Upload size ceiling for browser -> Portal. Without this, ingress-nginx
    # defaults to 1MB and caps every upload there. Kept a little above the
    # app's EFP_MAX_UPLOAD_MB (25MB) so oversized uploads get the Portal's
    # clear 413 ("Maximum size is 25MB") instead of nginx's generic one.
    # Raise both together when increasing the limit.
    nginx.ingress.kubernetes.io/proxy-body-size: "30m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: efp-portal-service
                port:
                  number: 80