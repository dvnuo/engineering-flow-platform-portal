# Portal Deployment with NFS Storage
# Uses NFS PersistentVolume + PersistentVolumeClaim (no CSI driver required)
#
# Prerequisites:
#   1. Have NFS server available (e.g., AWS EFS mounted on NFS, or traditional NFS)
#   2. Note NFS server IP/hostname and export path
#   3. Replace <NFS_SERVER> and <NFS_PATH> below
#
# Usage:
#   kubectl apply -f k8s/namespaces.yaml
#   kubectl apply -f k8s/rbac.yaml
#   kubectl apply -f k8s/portal-deployment-nfs.yaml

# NFS PersistentVolume (Static Provisioning)
# Note: Replace <NFS_SERVER> and <NFS_PATH> with your NFS details
# Example for AWS EFS: NFS server = efs-mount-target-ip, NFS path = /
kind: PersistentVolume
metadata:
  name: portal-nfs-pv
spec:
  capacity:
    storage: 10Gi
  storageClassName: nfs-client
  accessModes:
    - ReadWriteMany
  mountOptions:
    - rw
    - hard
    - timeo=600
    - retrans=2
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: <NFS_SERVER>
    path: <NFS_PATH>

# NFS PersistentVolumeClaim
kind: PersistentVolumeClaim
metadata:
  name: portal-nfs-pvc
  namespace: default
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: portal-nfs-pv

# Portal Service
kind: Service
metadata:
  name: portal
  namespace: default
  labels:
    app: portal
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: portal

# Portal Deployment
apiVersion: apps/v1
kind: Deployment
