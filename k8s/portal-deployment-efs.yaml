# Portal Deployment with EFS Storage (Simple Version)
# Requires: EFS File System + Access Point created in AWS

apiVersion: v1
kind: Namespace
metadata:
  name: agents
---
# EFS StorageClass with Access Point
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: <EFS_FILE_SYSTEM_ID>
  directoryPerms: "700"
  gidRangeStart: "1000"
  gidRangeEnd: "2000"
---
# Portal Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      hostNetwork: true
      serviceAccountName: portal
      containers:
      - name: portal
        image: ghcr.io/dvnuo/engineering-flow-platform-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: portal-code
          mountPath: /app
        - name: kubeconfig
          mountPath: /root/.kube
          readOnly: true
        env:
        - name: K8S_ENABLED
          value: "true"
        - name: K8S_INCLUSTER
          value: "false"
        - name: K8S_KUBECONFIG
          value: "/root/.kube/k3s.yaml"
        - name: AGENTS_NAMESPACE
          value: "agents"
      volumes:
      - name: portal-code
        hostPath:
          path: /root/engineering-flow-platform-portal
          type: Directory
      - name: kubeconfig
        hostPath:
          path: /etc/rancher/k3s
          type: Directory
