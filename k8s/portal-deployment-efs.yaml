# Simple Portal Deployment with local development in mind
# Uses hostPath for application code (mounted from host)
# This is a simple version for development/testing
#
# Usage:
#   kubectl apply -f k8s/portal-deployment-efs.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: agents
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: portal
      containers:
      - name: portal
        image: ghcr.io/dvnuo/engineering-flow-platform-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: portal-code
          mountPath: /app
        - name: kubeconfig
          mountPath: /root/.kube
          readOnly: true
        env:
        - name: K8S_ENABLED
          value: "true"
        - name: K8S_INCLUSTER
          value: "false"
        - name: K8S_KUBECONFIG
          value: "/root/.kube/k3s.yaml"
        - name: AGENTS_NAMESPACE
          value: "agents"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      # HostPath for local development
      - name: portal-code
        hostPath:
          path: /root/engineering-flow-platform-portal
          type: Directory
      - name: kubeconfig
        hostPath:
          path: /etc/rancher/k3s
          type: Directory
