apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      hostNetwork: true
      serviceAccountName: portal
      containers:
      - name: portal
        image: ghcr.io/dvnuo/engineering-flow-platform-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: portal-code
          mountPath: /app
        - name: kubeconfig
          mountPath: /root/.kube
          readOnly: true
        env:
        - name: K8S_ENABLED
          value: "true"
        - name: K8S_INCLUSTER
          value: "false"
        - name: K8S_KUBECONFIG
          value: "/root/.kube/k3s.yaml"
        - name: ROBOTS_NAMESPACE
          value: "robots"
        - name: AGENTS_NAMESPACE
          value: "agents"
      volumes:
      - name: portal-code
        hostPath:
          path: /root/engineering-flow-platform-portal
          type: Directory
      - name: kubeconfig
        hostPath:
          path: /etc/rancher/k3s
          type: Directory
