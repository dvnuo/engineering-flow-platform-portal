apiVersion: v1
kind: Namespace
metadata:
  name: agents
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: default
  labels:
    app: portal
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: portal
      containers:
      - name: portal
        image: ghcr.io/dvnuo/engineering-flow-platform-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: portal-code
          mountPath: /app
        - name: kubeconfig
          mountPath: /root/.kube
          readOnly: true
        env:
        - name: K8S_ENABLED
          value: "true"
        - name: K8S_INCLUSTER
          value: "false"
        - name: K8S_KUBECONFIG
          value: "/root/.kube/k3s.yaml"
        - name: AGENTS_NAMESPACE
          value: "agents"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: portal-code
        hostPath:
          path: /root/engineering-flow-platform-portal
          type: Directory
      - name: kubeconfig
        hostPath:
          path: /etc/rancher/k3s
          type: Directory

---

