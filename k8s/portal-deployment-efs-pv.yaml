# Portal Deployment with EFS using Static PV/PVC
# Uses EFS PersistentVolume + PersistentVolumeClaim (no CSI driver required)
#
# Prerequisites:
#   1. Create EFS File System in AWS Console or CLI
#   2. Note the EFS File System ID (e.g., fs-12345678)
#   3. Replace <EFS_FILE_SYSTEM_ID> below
#   4. Create mount targets in the same VPC as your EKS cluster
#
# Usage:
#   kubectl apply -f k8s/namespaces.yaml
#   kubectl apply -f k8s/rbac.yaml
#   kubectl apply -f k8s/portal-deployment-efs-pv.yaml

# EFS StorageClass (optional - for dynamic PVC if needed later)
apiVersion: storage.k8s.io/v1
kind: StorageClass
kind: PersistentVolume
metadata:
  name: portal-efs-pv
spec:
  capacity:
    storage: 10Gi
  storageClassName: efs-sc
  accessModes:
    - ReadWriteMany
  mountOptions:
    - tls
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: <EFS_FILE_SYSTEM_ID>:/portal
kind: PersistentVolumeClaim
metadata:
  name: portal-efs-pvc
  namespace: default
spec:
  storageClassName: efs-sc
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: portal-efs-pv
kind: Service
metadata:
  name: portal
  namespace: default
  labels:
    app: portal
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: portal
