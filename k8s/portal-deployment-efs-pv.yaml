# Portal Deployment with EFS using Static PV/PVC
# Uses EFS PersistentVolume + PersistentVolumeClaim (no CSI driver required)
#
# Prerequisites:
#   1. Create EFS File System in AWS Console or CLI
#   2. Note the EFS File System ID (e.g., fs-12345678)
#   3. Replace <EFS_FILE_SYSTEM_ID> below
#   4. Create mount targets in the same VPC as your EKS cluster
#
# Usage:
#   kubectl apply -f k8s/namespaces.yaml
#   kubectl apply -f k8s/rbac.yaml
#   kubectl apply -f k8s/portal-deployment-efs-pv.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: agents
---
# EFS StorageClass (optional - for dynamic PVC if needed later)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
---
# EFS PersistentVolume (Static Provisioning)
# Note: Replace <EFS_FILE_SYSTEM_ID> with your actual EFS ID
apiVersion: v1
kind: PersistentVolume
metadata:
  name: portal-efs-pv
spec:
  capacity:
    storage: 10Gi
  storageClassName: efs-sc
  accessModes:
    - ReadWriteMany
  mountOptions:
    - tls
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: <EFS_FILE_SYSTEM_ID>:/portal
---
# EFS PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portal-efs-pvc
  namespace: default
spec:
  storageClassName: efs-sc
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: portal-efs-pv
---
# Portal Service
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: default
  labels:
    app: portal
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: portal
---
# Portal Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: portal
      containers:
      - name: portal
        image: ghcr.io/dvnuo/engineering-flow-platform-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        # Mount EFS at /app/data to preserve image's /app code
        volumeMounts:
        - name: portal-data
          mountPath: /app/data
        - name: kubeconfig
          mountPath: /root/.kube
          readOnly: true
        env:
        - name: K8S_ENABLED
          value: "true"
        - name: K8S_INCLUSTER
          value: "false"
        - name: K8S_KUBECONFIG
          value: "/root/.kube/k3s.yaml"
        - name: AGENTS_NAMESPACE
          value: "agents"
        # Use /app/data for SQLite database
        - name: DATABASE_URL
          value: "sqlite:////app/data/portal.db"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      # EFS PV/PVC for persistent data (database)
      - name: portal-data
        persistentVolumeClaim:
          claimName: portal-efs-pvc
      - name: kubeconfig
        hostPath:
          path: /etc/rancher/k3s
          type: Directory

---

