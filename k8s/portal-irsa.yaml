# Portal Deployment with IRSA (IAM Role for Service Account)
# Uses AWS IAM roles instead of kubeconfig for K8s API access
#
# Prerequisites:
#   1. EKS cluster with OIDC provider configured
#   2. Create IAM role with trust policy for Service Account
#   3. Create Kubernetes ServiceAccount with IAM role annotation
#
# Usage:
#   kubectl apply -f k8s/portal-irsa.yaml

# ServiceAccount with IAM role annotation
kind: ServiceAccount
metadata:
  name: portal
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/portal-eks-role
# RBAC - Portal role to manage efp-agents namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
kind: Service
metadata:
  name: portal
  namespace: default
  labels:
    app: portal
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: portal
