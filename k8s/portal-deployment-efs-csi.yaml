# Portal Deployment with EFS Storage (using AWS EFS CSI Driver)
# Production-ready version with EFS PVC for database
#
# Prerequisites:
#   1. Install EFS CSI Driver on EKS: https://docs.aws.amazon.com/eks/latest/userguide/efs-csi.html
#   2. Create EFS File System and note the ID
#   3. Run terraform to create EFS resources, then apply this manifest
#
# Usage:
#   kubectl apply -f k8s/namespaces.yaml
#   kubectl apply -f k8s/rbac.yaml
#   kubectl apply -f k8s/portal-deployment-efs-csi.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: efp-agents
---
# EFS StorageClass with Access Point
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: <EFS_FILE_SYSTEM_ID>
  directoryPerms: "700"
  gidRangeStart: "1000"
  gidRangeEnd: "2000"
---
# EFS PersistentVolumeClaim for Portal Database
# NOTE: SQLite on EFS/NFS has concurrency limitations. For production, 
# consider using PostgreSQL/RDS instead of SQLite.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portal-efs-pvc
  namespace: default
spec:
  storageClassName: efs-sc
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: portal
      containers:
      - name: portal
        image: ghcr.io/dvnuo/engineering-flow-platform-portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        # Mount EFS at /app/data to preserve image's /app code
        volumeMounts:
        - name: portal-data
          mountPath: /app/data
        - name: kubeconfig
          mountPath: /root/.kube
          readOnly: true
        env:
        - name: K8S_ENABLED
          value: "true"
        - name: K8S_INCLUSTER
          value: "false"
        - name: K8S_KUBECONFIG
          value: "/root/.kube/k3s.yaml"
        - name: AGENTS_NAMESPACE
          value: "efp-agents"
        # Use /app/data for SQLite database
        - name: DATABASE_URL
          value: "sqlite:////app/data/portal.db"
        - name: K8S_STORAGE_CLASS
          value: "efs-sc"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      # EFS PVC for persistent data (database)
      - name: portal-data
        persistentVolumeClaim:
          claimName: portal-efs-pvc
      - name: kubeconfig
        hostPath:
          path: /etc/rancher/k3s
          type: Directory
