# ServiceAccount for portal
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portal
  namespace: default
---
# Role for portal to manage efp-agents in efp-agents namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-agent-manager
  namespace: efp-agents
rules:
- apiGroups: [""]
  resources: ["pods", "services", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# RoleBinding for portal
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portal-agent-binding
  namespace: efp-agents
subjects:
- kind: ServiceAccount
  name: portal
  namespace: default
roleRef:
  kind: Role
  name: portal-agent-manager
  apiGroup: rbac.authorization.k8s.io
